<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Step 1 - The Connoisseur Eye</title>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111111;
    }
    .page {
      width: 100%;
      min-height: 100dvh;
      padding: 22px 18px 28px;
      display: flex;
      justify-content: center;
    }
    .form-wrap { width: 100%; max-width: 430px; }
    .brand {
      font-size: 18px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.3;
    }
    .section-title {
      margin: 26px 0 18px;
      padding: 14px 0;
      border-top: 1px solid #111111;
      border-bottom: 1px solid #eeeeee;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }
    .question {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #eeeeee;
    }
    .hidden { display: none; }
    label.question-title {
      display: block;
      font-size: 15px;
      line-height: 1.45;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input[type="text"], input[type="email"], input[type="number"], textarea {
      width: 100%;
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }
    input[type="text"], input[type="email"], input[type="number"] { height: 42px; }
    textarea {
      min-height: 88px;
      padding: 12px;
      resize: vertical;
      line-height: 1.45;
    }
    input:focus, textarea:focus { border-color: #111111; }
    .choices { display: flex; flex-wrap: wrap; gap: 8px; }
    .choice { position: relative; }
    .choice input { position: absolute; opacity: 0; pointer-events: none; }
    .choice span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border: 1px solid #dddddd;
      border-radius: 20px;
      font-size: 14px;
      background: #ffffff;
    }
    .choice input:checked + span {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }
    .other-input, .reason-input { margin-top: 10px; display: none; }
    .reference-score {
      margin: 8px 0 10px;
      padding: 10px 12px;
      background: #f7f7f7;
      border-radius: 10px;
      font-size: 13px;
      color: #444444;
      line-height: 1.45;
    }
    .next-button {
      width: 100%;
      height: 50px;
      margin-top: 8px;
      border: none;
      border-radius: 25px;
      background: #111111;
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }
    .next-button:active { transform: scale(0.99); }
    .small-note {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.45;
      color: #666666;
      text-align: center;
    }

    .intro-page {
      width: 100%;
      height: 100dvh;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .intro-title {
      max-width: 340px;
      margin-bottom: 48px;
      font-size: 28px;
      font-weight: 300;
      line-height: 1.35;
      letter-spacing: -0.4px;
    }

    .start-button {
      width: 220px;
      height: 54px;
      border: none;
      border-radius: 27px;
      background: #111111;
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }

    .start-button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <section class="intro-page" id="introPage">
    <div class="intro-title">
      The Connoisseur Eye:<br>
      5-Star Hotel Review
    </div>
    <button type="button" class="start-button" id="startReviewButton">설문 시작하기</button>
  </section>

  <main class="page hidden" id="surveyPage">
    <form class="form-wrap" id="reviewForm">
      <div class="brand">The Connoisseur Eye</div>

      <section class="question">
        <label class="question-title" for="respondentId">1. 응답자를 식별하기 위한 알파벳과 숫자 조합 8자리를 입력해주세요(대소문자 구별)</label>
        <input id="respondentId" name="respondent_id" type="text" placeholder="예: Ab12Cd34" minlength="8" maxlength="8" pattern="[A-Za-z0-9]{8}" autocomplete="off" autocapitalize="none" required />
      </section>

      <section class="question">
        <label class="question-title" for="hotelName">2. 투숙 예정인 호텔의 정식 명칭을 적어주세요</label>
        <input id="hotelName" name="hotel_name" type="text" placeholder="호텔 정식 명칭" required />
      </section>

      <section class="question hidden" id="q2_1">
        <label class="question-title">2-1. 호텔 이용자 수는?</label>
        <div class="choices">
          <label class="choice"><input type="radio" name="guest_count" value="1명"><span>1명</span></label>
          <label class="choice"><input type="radio" name="guest_count" value="2명"><span>2명</span></label>
          <label class="choice"><input type="radio" name="guest_count" value="3명"><span>3명</span></label>
          <label class="choice"><input type="radio" name="guest_count" value="4명"><span>4명</span></label>
          <label class="choice"><input type="radio" name="guest_count" value="5명 이상"><span>5명 이상</span></label>
        </div>
      </section>

      <section class="question hidden" id="q2_2">
        <label class="question-title">2-2. 호텔 이용자의 구성은?</label>
        <div class="choices">
          <label class="choice"><input type="radio" name="guest_type" value="혼자"><span>혼자</span></label>
          <label class="choice"><input type="radio" name="guest_type" value="연인"><span>연인</span></label>
          <label class="choice"><input type="radio" name="guest_type" value="부부"><span>부부</span></label>
          <label class="choice"><input type="radio" name="guest_type" value="가족"><span>가족</span></label>
          <label class="choice"><input type="radio" name="guest_type" value="친구"><span>친구</span></label>
          <label class="choice"><input type="radio" name="guest_type" value="기타"><span>기타</span></label>
        </div>
      </section>

      <section class="question hidden" id="q2_3">
        <label class="question-title">2-3. 이용 가족의 구성은?</label>
        <div class="choices">
          <label class="choice"><input type="checkbox" name="family_members" value="아들"><span>아들</span></label>
          <label class="choice"><input type="checkbox" name="family_members" value="딸"><span>딸</span></label>
          <label class="choice"><input type="checkbox" name="family_members" value="어머니"><span>어머니</span></label>
          <label class="choice"><input type="checkbox" name="family_members" value="아버지"><span>아버지</span></label>
          <label class="choice"><input type="checkbox" name="family_members" value="배우자"><span>배우자</span></label>
          <label class="choice"><input type="checkbox" name="family_members" value="할머니"><span>할머니</span></label>
          <label class="choice"><input type="checkbox" name="family_members" value="할아버지"><span>할아버지</span></label>
          <label class="choice"><input type="checkbox" name="family_members" value="그 외 친척"><span>그 외 친척</span></label>
        </div>
      </section>

      <section class="question">
        <label class="question-title" for="roomRate">3. 객실료는 얼마입니까?</label>
        <input id="roomRate" name="room_rate" type="number" inputmode="numeric" placeholder="숫자만 입력" required />
      </section>

      <section class="question hidden" id="q3_1">
        <label class="question-title" for="nights">3-1. 몇 박을 투숙합니까?</label>
        <input id="nights" name="nights" type="number" inputmode="numeric" placeholder="숫자만 입력" />
      </section>

      <section class="question hidden" id="q3_2">
        <label class="question-title">3-2. 클럽 라운지 혜택이 포함되어 있습니까?</label>
        <div class="choices">
          <label class="choice"><input type="radio" name="club_lounge" value="예"><span>예</span></label>
          <label class="choice"><input type="radio" name="club_lounge" value="아니오"><span>아니오</span></label>
        </div>
      </section>

      <section class="question hidden" id="q3_2_1">
        <label class="question-title">3-2-1. 조식을 이용할 계획입니까?</label>
        <div class="choices">
          <label class="choice"><input type="radio" name="breakfast_plan" value="예"><span>예</span></label>
          <label class="choice"><input type="radio" name="breakfast_plan" value="아니오"><span>아니오</span></label>
        </div>
      </section>

      <section class="question">
        <label class="question-title" for="birthYear">4. 응답자가 태어난 년도를 입력해주세요 (예: 1974)</label>
        <input id="birthYear" name="birth_year" type="number" inputmode="numeric" placeholder="예: 1974" required />
      </section>

      <section class="question">
        <label class="question-title">5. 응답자의 성별을 선택해주세요</label>
        <div class="choices">
          <label class="choice"><input type="radio" name="gender" value="남자" required><span>남자</span></label>
          <label class="choice"><input type="radio" name="gender" value="여자"><span>여자</span></label>
          <label class="choice"><input type="radio" name="gender" value="기타"><span>기타</span></label>
        </div>
        <input class="other-input" id="genderOther" name="gender_other" type="text" placeholder="원하는 답을 입력해주세요" />
      </section>

      <section id="expectationSection" class="hidden">
        <div class="section-title">투숙 전 기대사항</div>

        <section class="question">
          <label class="question-title">6. 투숙의 목적은?</label>
          <div class="choices">
            <label class="choice"><input type="radio" name="stay_purpose" value="단기 출장"><span>단기 출장</span></label>
            <label class="choice"><input type="radio" name="stay_purpose" value="여가 목적의 휴가"><span>여가 목적의 휴가</span></label>
            <label class="choice"><input type="radio" name="stay_purpose" value="가족 및 지인의 행사나 모임 참석"><span>가족 및 지인의 행사나 모임 참석</span></label>
            <label class="choice"><input type="radio" name="stay_purpose" value="고용과 주거를 포함한 중장기 체류"><span>고용과 주거를 포함한 중장기 체류</span></label>
            <label class="choice"><input type="radio" name="stay_purpose" value="학업(유학, 어학연수 등)"><span>학업(유학, 어학연수 등)</span></label>
            <label class="choice"><input type="radio" name="stay_purpose" value="기타"><span>기타</span></label>
          </div>
          <input class="other-input" id="stayPurposeOther" name="stay_purpose_other" type="text" placeholder="기타 내용을 입력해주세요" />
        </section>

        <section class="question">
          <label class="question-title">7. 이 호텔에서 기능적으로 가장 기대하는 것은 무엇입니까?</label>
          <div class="choices">
            <label class="choice"><input type="radio" name="functional_expectation" value="질 높은 수면 및 휴식"><span>질 높은 수면 및 휴식</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="고품질 식사"><span>고품질 식사</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="웰니스 프로그램"><span>웰니스 프로그램</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="엔터테인먼트"><span>엔터테인먼트</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="레저 시설/프로그램"><span>레저 시설/프로그램</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="키즈 프로그램"><span>키즈 프로그램</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="효율적인 비즈니스 공간"><span>효율적인 비즈니스 공간</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="편리한 네트워킹 공간"><span>편리한 네트워킹 공간</span></label>
            <label class="choice"><input type="radio" name="functional_expectation" value="기타"><span>기타</span></label>
          </div>
          <input class="other-input" id="functionalExpectationOther" name="functional_expectation_other" type="text" placeholder="기타 내용을 입력해주세요" />
        </section>

        <section class="question">
          <label class="question-title">8. 이 호텔에서 감성적으로 가장 기대하는 것은 무엇입니까?</label>
          <div class="choices">
            <label class="choice"><input type="radio" name="emotional_expectation" value="안정감+편안함"><span>안정감+편안함</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="풍족감"><span>풍족감</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="내적 발견"><span>내적 발견</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="유대감+친밀감"><span>유대감+친밀감</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="즐거움+행복함"><span>즐거움+행복함</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="안전감"><span>안전감</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="성취감"><span>성취감</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="존재감"><span>존재감</span></label>
            <label class="choice"><input type="radio" name="emotional_expectation" value="기타"><span>기타</span></label>
          </div>
          <input class="other-input" id="emotionalExpectationOther" name="emotional_expectation_other" type="text" placeholder="기타 내용을 입력해주세요" />
        </section>

        <section class="question">
          <label class="question-title">9. 이 호텔에서 연상되는 이미지나 느낌을 3가지 고르세요</label>
          <div class="choices">
            <label class="choice"><input type="checkbox" name="hotel_image" value="calming & relaxing"><span>calming & relaxing</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="posh & elegant"><span>posh & elegant</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="family-friendly"><span>family-friendly</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="vibrant & active"><span>vibrant & active</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="festive & celebrating"><span>festive & celebrating</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="natural & eco-friendly"><span>natural & eco-friendly</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="culturally immersive"><span>culturally immersive</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="trendy & contemporary"><span>trendy & contemporary</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="urban & modern"><span>urban & modern</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="historically enriched"><span>historically enriched</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="peaceful & tranquil"><span>peaceful & tranquil</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="young & youthful"><span>young & youthful</span></label>
            <label class="choice"><input type="checkbox" name="hotel_image" value="기타"><span>기타</span></label>
          </div>
          <input class="other-input" id="hotelImageOther" name="hotel_image_other" type="text" placeholder="기타 내용을 입력해주세요" />
        </section>

        <section class="question">
          <label class="question-title" for="restScore">10. 이 호텔의 시설이나 서비스에서 예상되는 휴식 체감도를 예측 점수로 평가해주세요(100점 만점)</label>
          <input id="restScore" name="rest_score" type="number" inputmode="numeric" min="0" max="100" placeholder="0~100" />
        </section>

        <section class="question">
          <label class="question-title" for="luxuryScore">11. 이 호텔의 시설이나 서비스에서 예상되는 럭셔리 체감도를 예측 점수로 평가해주세요(100점 만점)</label>
          <input id="luxuryScore" name="luxury_score" type="number" inputmode="numeric" min="0" max="100" placeholder="0~100" />
        </section>

        <section class="question">
          <label class="question-title" for="predictedSatisfaction">12. 호텔을 예약한 시점에 이 호텔의 만족도 점수를 예측하여 평가한다면? (100점 만점)</label>
          <input id="predictedSatisfaction" name="predicted_satisfaction" type="number" inputmode="numeric" min="0" max="100" placeholder="0~100" />
        </section>
      </section>

      <section id="postStaySection" class="hidden">
        <div class="section-title">투숙 후 경험조사</div>

        <section class="question">
          <label class="question-title">13. 호텔의 기능적인 측면에서 다음 중 가장 만족스러웠던 것은 무엇입니까?</label>
          <div class="choices">
            <label class="choice"><input type="radio" name="functional_satisfaction" value="질 높은 수면 및 휴식"><span>질 높은 수면 및 휴식</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="고품질 식사"><span>고품질 식사</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="웰니스 프로그램"><span>웰니스 프로그램</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="엔터테인먼트"><span>엔터테인먼트</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="레저 시설/프로그램"><span>레저 시설/프로그램</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="키즈 프로그램"><span>키즈 프로그램</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="효율적인 비즈니스 공간"><span>효율적인 비즈니스 공간</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="편리한 네트워킹 공간"><span>편리한 네트워킹 공간</span></label>
            <label class="choice"><input type="radio" name="functional_satisfaction" value="기타"><span>기타</span></label>
          </div>
          <input class="other-input" id="functionalSatisfactionOther" name="functional_satisfaction_other" type="text" placeholder="기타 내용을 입력해주세요" />
        </section>

        <section class="question">
          <label class="question-title">14. 호텔 투숙 중에 가장 많이 느낀 감성/감정은 무엇이었습니까?</label>
          <div class="choices">
            <label class="choice"><input type="radio" name="emotional_experience" value="안정감+편안함"><span>안정감+편안함</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="풍족감"><span>풍족감</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="내적 발견"><span>내적 발견</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="유대감+친밀감"><span>유대감+친밀감</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="즐거움+행복함"><span>즐거움+행복함</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="안전감"><span>안전감</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="성취감"><span>성취감</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="존재감"><span>존재감</span></label>
            <label class="choice"><input type="radio" name="emotional_experience" value="기타"><span>기타</span></label>
          </div>

            <label class="choice"><input type="radio" name="recommend_hotel" value="아니오"><span>아니오</span></label>
            <label class="choice"><input type="radio" name="recommend_hotel" value="잘 모르겠음"><span>잘 모르겠음</span></label>
          </div>
        </section>


      <button type="submit" class="next-button">다음 단계로</button>
      <p class="small-note">서버 연결 후에는 이 버튼을 누르면 응답 저장 후 다음 단계로 이동합니다.</p>
    </form>
  </main>

  <script>
    document.getElementById("startReviewButton").addEventListener("click", function () {
      document.getElementById("introPage").classList.add("hidden");
      document.getElementById("surveyPage").classList.remove("hidden");
      window.scrollTo(0, 0);
    });

    const hotelName = document.getElementById("hotelName");
    const q2_1 = document.getElementById("q2_1");
    const q2_2 = document.getElementById("q2_2");
    const q2_3 = document.getElementById("q2_3");

    const roomRate = document.getElementById("roomRate");
    const q3_1 = document.getElementById("q3_1");
    const nights = document.getElementById("nights");
    const q3_2 = document.getElementById("q3_2");
    const q3_2_1 = document.getElementById("q3_2_1");

    const genderOther = document.getElementById("genderOther");
    const expectationSection = document.getElementById("expectationSection");
    const postStaySection = document.getElementById("postStaySection");
    const form = document.getElementById("reviewForm");

    const restScore = document.getElementById("restScore");
    const luxuryScore = document.getElementById("luxuryScore");
    const predictedSatisfaction = document.getElementById("predictedSatisfaction");

    const actualRestScore = document.getElementById("actualRestScore");
    const actualLuxuryScore = document.getElementById("actualLuxuryScore");
    const actualSatisfaction = document.getElementById("actualSatisfaction");
    const roomBreakfastSection = document.getElementById("roomBreakfastSection");
    const finalSection = document.getElementById("finalSection");

    hotelName.addEventListener("input", function () {
      if (hotelName.value.trim() !== "") {
        q2_1.classList.remove("hidden");
      } else {
        q2_1.classList.add("hidden");
        q2_2.classList.add("hidden");
        q2_3.classList.add("hidden");
      }
    });

    document.querySelectorAll('input[name="guest_count"]').forEach(function (radio) {
      radio.addEventListener("change", function () { q2_2.classList.remove("hidden"); });
    });

    document.querySelectorAll('input[name="guest_type"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        if (radio.value === "가족" && radio.checked) {
          q2_3.classList.remove("hidden");
        } else if (radio.checked) {
          q2_3.classList.add("hidden");
          document.querySelectorAll('input[name="family_members"]').forEach(box => box.checked = false);
        }
      });
    });

    roomRate.addEventListener("input", function () {
      if (roomRate.value.trim() !== "") {
        q3_1.classList.remove("hidden");
      } else {
        q3_1.classList.add("hidden");
        q3_2.classList.add("hidden");
        q3_2_1.classList.add("hidden");
      }
    });

    nights.addEventListener("input", function () {
      if (nights.value.trim() !== "") {
        q3_2.classList.remove("hidden");
      } else {
        q3_2.classList.add("hidden");
        q3_2_1.classList.add("hidden");
      }
    });

    document.querySelectorAll('input[name="club_lounge"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        if (radio.value === "아니오" && radio.checked) {
          q3_2_1.classList.remove("hidden");
        } else if (radio.checked) {
          q3_2_1.classList.add("hidden");
          document.querySelectorAll('input[name="breakfast_plan"]').forEach(item => item.checked = false);
        }
      });
    });

    document.querySelectorAll('input[name="gender"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        if (radio.value === "기타" && radio.checked) {
          genderOther.style.display = "block";
        } else if (radio.checked) {
          genderOther.style.display = "none";
          genderOther.value = "";
        }
        expectationSection.classList.remove("hidden");
      });
    });

    function bindOtherInput(radioName, otherInputId) {
      const otherInput = document.getElementById(otherInputId);
      document.querySelectorAll('input[name="' + radioName + '"]').forEach(function (radio) {
        radio.addEventListener("change", function () {
          if (radio.value === "기타" && radio.checked) {
            otherInput.style.display = "block";
          } else if (radio.checked) {
            otherInput.style.display = "none";
            otherInput.value = "";
          }
        });
      });
    }

    bindOtherInput("stay_purpose", "stayPurposeOther");
    bindOtherInput("functional_expectation", "functionalExpectationOther");
    bindOtherInput("emotional_expectation", "emotionalExpectationOther");
    bindOtherInput("functional_satisfaction", "functionalSatisfactionOther");
    bindOtherInput("emotional_experience", "emotionalExperienceOther");

    function bindThreeChoiceLimit(checkboxName, otherInputId) {
      const otherInput = document.getElementById(otherInputId);

      document.querySelectorAll('input[name="' + checkboxName + '"]').forEach(function (checkbox) {
        checkbox.addEventListener("change", function () {
          const checkedItems = document.querySelectorAll('input[name="' + checkboxName + '"]:checked');

          if (checkedItems.length > 3) {
            checkbox.checked = false;
            alert("3가지만 선택할 수 있습니다.");
            return;
          }

          const otherChecked = document.querySelector('input[name="' + checkboxName + '"][value="기타"]').checked;

          if (otherChecked) {
            otherInput.style.display = "block";
          } else {
            otherInput.style.display = "none";
            otherInput.value = "";
          }
        });
      });
    }

    bindThreeChoiceLimit("hotel_image", "hotelImageOther");
    bindThreeChoiceLimit("actual_hotel_image", "actualHotelImageOther");

    document.querySelectorAll('input[name="service_system"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        const q16_1 = document.getElementById("q16_1");
        const reason = document.getElementById("serviceSystemReason");

        if ((radio.value === "아니오" || radio.value === "모르겠음") && radio.checked) {
          q16_1.classList.remove("hidden");
        } else if (radio.checked) {
          q16_1.classList.add("hidden");
          reason.value = "";
        }
      });
    });

    function updateReferenceScores() {
      document.getElementById("restReference").textContent =
        restScore.value ? "10번 사전 예측 점수: " + restScore.value + "점" : "10번 사전 예측 점수: 아직 입력되지 않았습니다.";

      document.getElementById("luxuryReference").textContent =
        luxuryScore.value ? "11번 사전 예측 점수: " + luxuryScore.value + "점" : "11번 사전 예측 점수: 아직 입력되지 않았습니다.";

      document.getElementById("satisfactionReference").textContent =
        predictedSatisfaction.value ? "12번 사전 예측 점수: " + predictedSatisfaction.value + "점" : "12번 사전 예측 점수: 아직 입력되지 않았습니다.";
    }

    function showPostStayIfReady() {
      if (predictedSatisfaction.value.trim() !== "") {
        postStaySection.classList.remove("hidden");
        updateReferenceScores();
      } else {
        postStaySection.classList.add("hidden");
      }
    }

    restScore.addEventListener("input", updateReferenceScores);
    luxuryScore.addEventListener("input", updateReferenceScores);
    predictedSatisfaction.addEventListener("input", showPostStayIfReady);

    function bindScoreChangeReason(beforeInput, afterInput, reasonSectionId, reasonInputId) {
      afterInput.addEventListener("input", function () {
        const before = beforeInput.value.trim();
        const after = afterInput.value.trim();
        const reasonSection = document.getElementById(reasonSectionId);
        const reasonInput = document.getElementById(reasonInputId);

        if (before !== "" && after !== "" && Number(before) !== Number(after)) {
          reasonSection.classList.remove("hidden");
        } else {
          reasonSection.classList.add("hidden");
          reasonInput.value = "";
        }
      });
    }

    bindScoreChangeReason(restScore, actualRestScore, "q17_1", "restScoreReason");
    bindScoreChangeReason(luxuryScore, actualLuxuryScore, "q18_1", "luxuryScoreReason");
    bindScoreChangeReason(predictedSatisfaction, actualSatisfaction, "q19_1", "satisfactionReason");

    actualSatisfaction.addEventListener("input", function () {
      if (actualSatisfaction.value.trim() !== "") {
        roomBreakfastSection.classList.remove("hidden");
      } else {
        roomBreakfastSection.classList.add("hidden");
      }
    });

    bindOtherInput("best_room_facility_service", "bestRoomFacilityServiceOther");

    function bindCheckboxOtherInput(checkboxName, otherInputId) {
      const otherInput = document.getElementById(otherInputId);

      document.querySelectorAll('input[name="' + checkboxName + '"]').forEach(function (checkbox) {
        checkbox.addEventListener("change", function () {
          const otherCheckbox = document.querySelector('input[name="' + checkboxName + '"][value="기타"]');

          if (otherCheckbox && otherCheckbox.checked) {
            otherInput.style.display = "block";
          } else {
            otherInput.style.display = "none";
            otherInput.value = "";
          }
        });
      });
    }

    bindCheckboxOtherInput("room_facility_discomfort", "roomFacilityDiscomfortOther");
    bindCheckboxOtherInput("room_service_discomfort", "roomServiceDiscomfortOther");
    bindCheckboxOtherInput("checkin_checkout_discomfort", "checkinCheckoutDiscomfortOther");

    function showFoodQuestionsAfterQ23() {
      const selectedQ23 = document.querySelectorAll('input[name="checkin_checkout_discomfort"]:checked');
      if (selectedQ23.length === 0) return;

      const clubLounge = getRadioValue("club_lounge");
      const breakfastPlan = getRadioValue("breakfast_plan");

      if (clubLounge === "예" || breakfastPlan === "예") {
        document.getElementById("q24").classList.remove("hidden");
      } else {
        document.getElementById("q24").classList.add("hidden");
        document.getElementById("q24_1").classList.add("hidden");
      }

      if (clubLounge === "예") {
        document.getElementById("q25").classList.remove("hidden");
      } else {
        document.getElementById("q25").classList.add("hidden");
        document.getElementById("q25_1").classList.add("hidden");
      }

      document.getElementById("q26").classList.remove("hidden");
    }

    document.querySelectorAll('input[name="checkin_checkout_discomfort"]').forEach(function (checkbox) {
      checkbox.addEventListener("change", showFoodQuestionsAfterQ23);
    });

    function bindDissatisfactionReason(radioName, reasonSectionId, reasonInputId) {
      document.querySelectorAll('input[name="' + radioName + '"]').forEach(function (radio) {
        radio.addEventListener("change", function () {
          const reasonSection = document.getElementById(reasonSectionId);
          const reasonInput = document.getElementById(reasonInputId);

          if ((radio.value === "만족하지 않는다" || radio.value === "잘 모르겠다") && radio.checked) {
            reasonSection.classList.remove("hidden");
          } else if (radio.checked) {
            reasonSection.classList.add("hidden");
            reasonInput.value = "";
          }
        });
      });
    }

    bindDissatisfactionReason("breakfast_quality_satisfaction", "q24_1", "breakfastQualityReason");
    bindDissatisfactionReason("club_lounge_fnb_satisfaction", "q25_1", "clubLoungeFnbReason");
    bindDissatisfactionReason("hotel_fnb_quality_satisfaction", "q26_1_1", "hotelFnbQualityReason");

    document.querySelectorAll('input[name="used_hotel_fnb"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        const q26_1 = document.getElementById("q26_1");
        const q26_1_1 = document.getElementById("q26_1_1");
        const q26_2 = document.getElementById("q26_2");

        if (radio.value === "예" && radio.checked) {
          q26_1.classList.remove("hidden");
          q26_2.classList.add("hidden");
          document.getElementById("hotelFnbNotUsedReason").value = "";
          finalSection.classList.remove("hidden");
        } else if (radio.value === "아니오" && radio.checked) {
          q26_1.classList.add("hidden");
          q26_1_1.classList.add("hidden");
          q26_2.classList.remove("hidden");
          document.querySelectorAll('input[name="hotel_fnb_quality_satisfaction"]').forEach(item => item.checked = false);
          document.getElementById("hotelFnbQualityReason").value = "";
          finalSection.classList.remove("hidden");
        }
      });
    });


    function getRadioValue(name) {
      const selected = document.querySelector('input[name="' + name + '"]:checked');
      return selected ? selected.value : "";
    }

    function getCheckboxValues(name) {
      return Array.from(document.querySelectorAll('input[name="' + name + '"]:checked'))
        .map(box => box.value)
        .join("|");
    }

    function validateScore(id) {
      const input = document.getElementById(id);
      if (input.value === "") return true;
      const value = Number(input.value);
      if (value < 0 || value > 100) {
        alert("점수는 0점 이상 100점 이하로 입력해주세요.");
        input.focus();
        return false;
      }
      return true;
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const respondentId = document.getElementById("respondentId").value.trim();

      if (!/^[A-Za-z0-9]{8}$/.test(respondentId)) {
        alert("1번 식별자는 대소문자를 구별하는 알파벳과 숫자 조합 8자리로 입력해주세요.");
        document.getElementById("respondentId").focus();
        return;
      }

      const scoreIds = [
        "restScore", "luxuryScore", "predictedSatisfaction",
        "actualRestScore", "actualLuxuryScore", "actualSatisfaction"
      ];

      for (const id of scoreIds) {
        if (!validateScore(id)) return;
      }

      const gender = getRadioValue("gender");

      const data = {
        respondent_id: document.getElementById("respondentId").value.trim(),
        hotel_name: hotelName.value.trim(),
        guest_count: getRadioValue("guest_count"),
        guest_type: getRadioValue("guest_type"),
        family_members: getCheckboxValues("family_members"),
        room_rate: roomRate.value.trim(),
        nights: nights.value.trim(),
        club_lounge: getRadioValue("club_lounge"),
        breakfast_plan: getRadioValue("breakfast_plan"),
        birth_year: document.getElementById("birthYear").value.trim(),
        gender: gender,
        gender_other: gender === "기타" ? genderOther.value.trim() : "",

        stay_purpose: getRadioValue("stay_purpose"),
        stay_purpose_other: document.getElementById("stayPurposeOther").value.trim(),
        functional_expectation: getRadioValue("functional_expectation"),
        functional_expectation_other: document.getElementById("functionalExpectationOther").value.trim(),
        emotional_expectation: getRadioValue("emotional_expectation"),
        emotional_expectation_other: document.getElementById("emotionalExpectationOther").value.trim(),
        hotel_image: getCheckboxValues("hotel_image"),
        hotel_image_other: document.getElementById("hotelImageOther").value.trim(),
        rest_score: restScore.value.trim(),
        luxury_score: luxuryScore.value.trim(),
        predicted_satisfaction: predictedSatisfaction.value.trim(),

        functional_satisfaction: getRadioValue("functional_satisfaction"),
        functional_satisfaction_other: document.getElementById("functionalSatisfactionOther").value.trim(),
        emotional_experience: getRadioValue("emotional_experience"),
        emotional_experience_other: document.getElementById("emotionalExperienceOther").value.trim(),
        actual_hotel_image: getCheckboxValues("actual_hotel_image"),
        actual_hotel_image_other: document.getElementById("actualHotelImageOther").value.trim(),
        service_system: getRadioValue("service_system"),
        service_system_reason: document.getElementById("serviceSystemReason").value.trim(),
        actual_rest_score: actualRestScore.value.trim(),
        rest_score_reason: document.getElementById("restScoreReason").value.trim(),
        actual_luxury_score: actualLuxuryScore.value.trim(),
        luxury_score_reason: document.getElementById("luxuryScoreReason").value.trim(),
        actual_satisfaction: actualSatisfaction.value.trim(),
        satisfaction_reason: document.getElementById("satisfactionReason").value.trim(),

        best_room_facility_service: getRadioValue("best_room_facility_service"),
        best_room_facility_service_other: document.getElementById("bestRoomFacilityServiceOther").value.trim(),
        room_facility_discomfort: getCheckboxValues("room_facility_discomfort"),
        room_facility_discomfort_other: document.getElementById("roomFacilityDiscomfortOther").value.trim(),
        room_service_discomfort: getCheckboxValues("room_service_discomfort"),
        room_service_discomfort_other: document.getElementById("roomServiceDiscomfortOther").value.trim(),
        checkin_checkout_discomfort: getCheckboxValues("checkin_checkout_discomfort"),
        checkin_checkout_discomfort_other: document.getElementById("checkinCheckoutDiscomfortOther").value.trim(),

        breakfast_quality_satisfaction: getRadioValue("breakfast_quality_satisfaction"),
        breakfast_quality_reason: document.getElementById("breakfastQualityReason").value.trim(),
        club_lounge_fnb_satisfaction: getRadioValue("club_lounge_fnb_satisfaction"),
        club_lounge_fnb_reason: document.getElementById("clubLoungeFnbReason").value.trim(),
        used_hotel_fnb: getRadioValue("used_hotel_fnb"),
        hotel_fnb_quality_satisfaction: getRadioValue("hotel_fnb_quality_satisfaction"),
        hotel_fnb_quality_reason: document.getElementById("hotelFnbQualityReason").value.trim(),
        hotel_fnb_not_used_reason: document.getElementById("hotelFnbNotUsedReason").value.trim(),

        value_for_money: getRadioValue("value_for_money"),
        revisit_hotel: getRadioValue("revisit_hotel"),
        recommend_hotel: getRadioValue("recommend_hotel")
      };

      try {
        const response = await fetch("/save-review1", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          window.location.href = "review2.html";
        } else {
          alert("저장 중 문제가 발생했습니다. 다시 시도해주세요.");
        }
      } catch (error) {
        alert("아직 서버가 연결되지 않았습니다. 서버 연결 후 저장과 이동이 가능합니다.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
