const byId=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const state={hotel:'',city:'',ranking:[],scoreBands:null};
function toast(msg){const t=byId('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function optionHTML(name,opt,type='radio'){return `<label class="option"><input type="${type}" name="${name}" value="${esc(opt)}"><span>${esc(opt)}</span></label>`}
function card(id,title,body,required=true){return `<section class="card" id="card-${id}" data-q="${id}"><p class="qtitle">${title}${required?'<span class="required">필수</span>':''}</p>${body}<div class="error" id="err-${id}"></div></section>`}
function single(id,title,opts,{other=false,condition=null,required=true}={}){let b=`<div class="options">${opts.map(o=>optionHTML(id,o)).join('')}</div>`;if(other)b+=`<div class="conditional" id="${id}-other"><input class="field" name="${id}_other" placeholder="기타 내용을 입력해주세요"></div>`;return card(id,title,b,required)}
function multi(id,title,opts,{other=false,none=null,required=true}={}){let b=`<div class="options">${opts.map(o=>optionHTML(id,o,'checkbox')).join('')}</div>`;if(other)b+=`<div class="conditional" id="${id}-other"><input class="field" name="${id}_other" placeholder="기타 내용을 입력해주세요"></div>`;return card(id,title,b,required)}
function textq(id,title,{textarea=false,required=true,placeholder=''}={}){return card(id,title,textarea?`<textarea class="field" name="${id}" placeholder="${placeholder}"></textarea>`:`<input class="field" name="${id}" placeholder="${placeholder}">`,required)}
function numq(id,title,{min=0,max=100,step=1,guide=false,required=true}={}){return card(id,title,`${guide?'<div class="score-guide score-guide-slot">Q31에서 설정한 개인별 점수 구간이 여기에 표시됩니다.</div>':''}<input class="field" type="number" name="${id}" min="${min}" max="${max}" step="${step}" inputmode="numeric">`,required)}
function section(title,note=''){return `<div class="section"><h2 class="section-title">${title}</h2>${note?`<p class="note">${note}</p>`:''}</div>`}

 byId('hotelSearch').oninput=e=>renderHotels(e.target.value);byId('hotelSearch').onfocus=e=>renderHotels(e.target.value);

 if(name==='Q4'){const pairs=[[O.q4[0],O.q4[1]],[O.q4[2],O.q4[3]]];for(const [a,b] of pairs)if(selected.includes(a)&&selected.includes(b)){document.querySelectorAll('[name=Q4]').forEach(x=>x.checked=false);toast('모순되는 답변을 모두 선택할 수 없습니다. Q4 선택을 다시 해주세요.');break}}
 show(name+'-other',selected.includes('기타'));}
function rank(btn){const val=btn.dataset.rank,none='뷰는 신경쓰지 않는다';if(val===none){state.ranking=state.ranking.includes(none)?[]:[none]}else{state.ranking=state.ranking.filter(x=>x!==none);state.ranking.includes(val)?state.ranking=state.ranking.filter(x=>x!==val):state.ranking.push(val)}document.querySelector('[name=Q12]').value=state.ranking.join(' > ');const noneSelected=state.ranking.includes(none);document.querySelectorAll('.rank-item').forEach(b=>{const i=state.ranking.indexOf(b.dataset.rank),isNone=b.dataset.rank===none;b.querySelector('.rank-num').textContent=i>=0?i+1:'-';b.disabled=noneSelected&&!isNone;b.setAttribute('aria-disabled',b.disabled?'true':'false')});updateProgress()}
function bands(){const names=['Q31_very_bad','Q31_bad','Q31_normal','Q31_good','Q31_very_good'];const a=names.map(n=>Number(document.querySelector(`[name=${n}]`).value));if(a.some(Number.isNaN)){return}if(!(a[0]<a[1]&&a[1]<a[2]&&a[2]<a[3]&&a[3]<a[4])){byId('bandPreview').textContent='구간별 최소 점수는 반드시 오름차순이어야 합니다.';state.scoreBands=null;return}state.scoreBands=a;const [v,b,n,g,vg]=a;const s=`매우 불만족 ${v}~${b-1} / 불만족 ${b}~${n-1} / 보통 ${n}~${g-1} / 만족 ${g}~${vg-1} / 매우 만족 ${vg}~100`;byId('bandPreview').textContent=s;document.querySelectorAll('.score-guide-slot').forEach(x=>x.textContent=s)}
function scoreFollow(id,score){if(!state.scoreBands)return;const [,b,n,g,vg]=state.scoreBands;show(`cond-${id}-bad`,score<g);show(`cond-${id}-good`,score>=vg)}
function facilities(){const f=vals('Q29'),s=vals('Q30');show('facility-Q35',f.includes('클럽 라운지'));show('facility-Q36',f.includes('Gym(실내 수영장 포함)'));show('facility-Q37',f.some(x=>x.startsWith('야외 시설')));show('facility-Q38',s.includes('조식'))}
function activeCards(){return [...document.querySelectorAll('.card')].filter(c=>{let e=c;while(e){if(e.classList?.contains('conditional')&&!e.classList.contains('show'))return false;e=e.parentElement}return true})}
function isFieldActive(e){if(!e.name||e.disabled)return false;const hiddenConditional=e.closest('.conditional');if(hiddenConditional&&!hiddenConditional.classList.contains('show'))return false;return true}
function answered(card){const els=[...card.querySelectorAll('input,select,textarea')].filter(isFieldActive);if(!els.length)return true;const grouped={};els.forEach(e=>(grouped[e.name]??=[]).push(e));return Object.values(grouped).every(g=>{const t=g[0].type;if(['radio','checkbox'].includes(t))return g.some(x=>x.checked);return g.some(x=>String(x.value).trim()!=='')})}
function updateProgress(){const cards=activeCards(),done=cards.filter(answered).length,p=cards.length?Math.round(done/cards.length*100):0;byId('bar').style.width=p+'%';byId('progressText').textContent=`${done}/${cards.length} · ${p}%`}
function validate(){document.querySelectorAll('.error').forEach(e=>e.textContent='');let bad=[];for(const c of activeCards()){if(!answered(c)){bad.push(c);const e=c.querySelector('.error');if(e)e.textContent='필수 질문입니다.'}}
 const code=document.querySelector('[name=Q52]')?.value||'';if(code&&!/^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{4}$/.test(code)){const c=byId('card-Q52');c.querySelector('.error').textContent='알파벳과 숫자를 모두 포함한 4자리로 입력해주세요.';bad.push(c)}
 if(!state.scoreBands){const c=byId('card-Q31');c.querySelector('.error').textContent='점수 구간을 올바른 오름차순으로 입력해주세요.';bad.push(c)}
 if(bad.length){bad[0].scrollIntoView({behavior:'smooth',block:'center'});return false}return true}
function collect(){const fd=new FormData(byId('surveyForm')),o={submittedAt:new Date().toISOString()};for(const [k,v] of fd){if(o[k]===undefined)o[k]=v;else if(Array.isArray(o[k]))o[k].push(v);else o[k]=[o[k],v]}o.Q0=state.hotel;o.Q12=state.ranking;return o}
async function submitForm(e){e.preventDefault();if(!validate())return;const data=collect();const btn=byId('submitBtn');btn.disabled=true;try{if(CONFIG.GOOGLE_APPS_SCRIPT_URL){const r=await fetch(CONFIG.GOOGLE_APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'submit',data})});const j=await r.json();if(!j.ok)throw new Error(j.message||'저장 실패')}else{const all=JSON.parse(localStorage.getItem('tce_vietnam_responses')||'[]');if(all.some(x=>x.Q52===data.Q52))throw new Error('이미 사용된 식별문자입니다.');all.push(data);localStorage.setItem('tce_vietnam_responses',JSON.stringify(all))}byId('survey').innerHTML='<section class="hero"><h1>설문 제출이 완료되었습니다.</h1><p>소중한 응답에 감사드립니다.</p></section>';window.scrollTo({top:0,behavior:'smooth'})}catch(err){toast(err.message);btn.disabled=false}}
async function start(){const btn=byId('startBtn');btn.disabled=true;try{let count=0;if(CONFIG.GOOGLE_APPS_SCRIPT_URL){const r=await fetch(CONFIG.GOOGLE_APPS_SCRIPT_URL+'?action=count');const j=await r.json();count=Number(j.count||0)}else count=JSON.parse(localStorage.getItem('tce_vietnam_responses')||'[]').length;if(count>=CONFIG.MAX_RESPONSES){byId('startMsg').textContent='응답 가능 인원이 충족되어 설문을 더 이상 받지 않습니다.';return}byId('hero').style.display='none';byId('survey').style.display='block';build();window.scrollTo(0,0)}catch(e){byId('startMsg').textContent='응답 가능 여부를 확인하지 못했습니다. 잠시 후 다시 시도해주세요.';btn.disabled=false}}
byId('startBtn').addEventListener('click',start);
</script></body></html>
